{% extends "base.html" %}

{%block head%}
<title>Graph</title>
{%endblock%}

{%block body%}
{% if graph %}
<div class="graph-container">
    <h3>Performance Graph</h3>

    <img src="data:image/png;base64,{{ graph }}"
        class="graph-image" alt="Performance graph">
    <form action="/home">
        <button class="field" type="button" onclick="window.location.href='/home'">Back to home</button>
    </form>
</div>
{% else %}
<div class="graph-container">
    <h3>No graph data available</h3>
    <p>We couldn't generate a graph for this student. The marks record may be missing.</p>
    <form action="/home">
        <button class="field" type="button" onclick="window.location.href='/home'">Back to home</button>
    </form>
</div>
{% endif %}
{%endblock%}
