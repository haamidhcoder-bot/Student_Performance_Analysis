<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis</title>
</head>
<body>
    <nav>
        <a href="#" class="logo">Study Performance Analysis/a>
        <ul>
            <li><a href="Home.html">Home</a></li>
            <li><a href="#">Student Data</a></li>
            <li><a href="#">leaderboard</a></li>
            <li><a href="#">About us</a></li>
        </ul>
      </nav>
    <form action="/refresh" method="get">
        <button type="submit" style="float: right;">⟳</button>
        <form action="/mark"  method="POST">
            <label for="subject">Subject</label>
            {%if class_value<=10%}
            <select name="subject10" id="sub1">
                <option value=""> Select Subject </option>
                <option value="English">English</option>
                <option value="Math">Math</option>
                <option value="Social">Social</option>
                <option value="Science">Science</option>
                <option value="Tamil">Tamil</option>
                <option value="All Subjects">All Subjects</option>
            </select><br>
            <label for="Exam">Exam</label>
            <select name="exam" id="exam" >
                <option value=""> Select Exam </option>
                <option value="Unit Test 1">Unit Test 1</option>
                <option value="Quarterly Exam">Quarterly Exam</option>
                <option value="Half Yearly Exam">Half Yearly Exam</option>
                <option value="Unit Test 2">Unit Test 2</option>
        <option value="Annual Exam">Annual Exam</option>
    </select><br>
    <table border="2px">
        <thead>
            <th>Roll no</th>
            <th>Student name</th>
            <th>Marks</th>
        </thead>
        {%for stu in students%}
        <tr>
            <td>{{stu.roll_no}}</td>
            <td>{{stu.student_name}}</td>
            {%for mark in results%}
            
        </tr>
        {%endfor%}
    </table>
    {%else%}
    <select name="subject12" id="sub2">
        <option value="English">English</option>
        <option value="Math">Math</option>
        <option value="Physics">Physics</option>
        <option value="Chemistry">Chemistry</option>
        <option value="Biology">Biology</option>
        <option value="All Subjects">All Subjects</option>
    </select>
    {%endif%}
    <button type="submit">Submit</button>
</form>
</form>
</body>
</html>
