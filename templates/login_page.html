<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
          <h1>Login</h1>
          <form method="POST">
            <input type="email" name="username" class="icon-email" placeholder="Email ID" required>
            <input type="password" name="password" class="icon-password" placeholder="Password" required>
            <div class="login-options">
              <label><input type="checkbox" name="remember" value="remember"> Remember me</label>
              <a href="/forget_pass">Forgot Password?</a>
            </div>
            <button type="submit" class="login-btn">Login</button>
          </form>
          <div class="register-line"><br>
          <a href="{{ url_for('support') }}">Support</a></div>
        </div>
      </div>
</body>
</html>
