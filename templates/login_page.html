<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <header>Login</header>
    <form action="" method="POST">
        <input type="text" name="username" id="user" placeholder="Enter the username" required><br>
        <input type="password" name="password" id="pass" placeholder="Enter the password" required><br>
        <button type="submit">Log In</button>
    </form>
    <footer>
        QR code for contacting support by scanning it for help with login issues
        <img src="{{ url_for('static', filename='qrcode.jpeg') }}" > 
    </footer>
</body>
</html>
