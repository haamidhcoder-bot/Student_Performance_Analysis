<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
  {% if log %}
  <div id="loginModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <span>Code</span>
        <span class="modal-close" onclick="closeLoginModal()">&times;</span>
      </div>
      <div class="modal-body">
        Logged in through <strong>{{ user }}</strong>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeLoginModal()">OK</button>
      </div>
    </div>
  </div>
  <script>
    function closeLoginModal() {
      document.getElementById('loginModal').style.display = 'none';
    }
  </script>
  <style>
    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.4);
      display: flex; align-items:center; justify-content:center;
      z-index: 1000;
    }
    .modal-box {
      background:#fff; border-radius:8px; width:340px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      font-family: inherit;
    }
    .modal-header {
      display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px;
      background:#e7f0fa; border-radius:8px 8px 0 0; font-weight:600;
      color:#0d3b66;
    }
    .modal-close { cursor:pointer; font-size:18px; line-height:1; }
    .modal-close:hover { color:#c0392b; }
    .modal-body { padding:22px 18px; color:#333; }
    .modal-footer { text-align:right; padding:12px 16px; border-top:1px solid #eee; }
    .modal-footer button {
      background:#1565c0; color:#fff; border:none; padding:8px 20px;
      border-radius:4px; cursor:pointer; font-weight:600;
    }
    .modal-footer button:hover { background:#0d47a1; }
  </style>
  {% endif %}
  <div class="container">
    <div class="card" style="max-width: 420px; margin: 60px auto;">
      <h2 style="text-align:center;">Select class </h2>
      {% if error %}
          <div class="alert alert-error">{{ error }}</div>
          {% endif %}
          <form action="/data" method="post">
            <div class="filter-bar" style="background:none; border:none; padding:0; margin-bottom:0;">
              <div class="field">
                <label for="class">Class</label>
                <input type="number" name="class" id="class" placeholder="Enter the class" min="1" max="12">
              </div>
            </div>
            <button type="submit" style="width:100%;">Submit</button>
          </form>
        </div>
      </div> 
</body>
</html>
